name: CodeBoarding sync

on:
  push:
    branches: ['master']
    paths-ignore:
      - '.codeboarding/*.md'
      - '.codeboarding/analysis.json'
      - '.codeboarding/static_analysis.pkl'
      - '.codeboarding/static_analysis.sha'
      - '.codeboarding/codeboarding_version.json'
      - '.codeboarding/health/**'
      - 'docs/development/architecture.md'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Ignore the committed baseline and rebuild it from scratch (full analysis).'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: codeboarding-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: CodeBoarding/CodeBoarding-action@fix/review-target-baseline
        with:
          mode: sync
          llm_provider: google
          llm_api_key: ${{ secrets.GOOGLE_API_KEY }}
          force_full: ${{ inputs.force_full || false }}
